name: CI to Develop

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  run-unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

  run-android-instrumentation-tests:
    runs-on: ubuntu-latest
    needs: run-unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Run Android UI tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: google_apis
          arch: x86
          profile: Nexus 5X
          ram-size: 1536
          heap-size: 256
          sdcard-path-or-size: 512M
          emulator-options: -no-window -no-audio -no-snapshot -gpu swiftshader_indirect
          disable-animations: true
          emulator-boot-timeout: 1000
          script: |
            adb wait-for-device
            adb shell 'while [[ -z $(getprop sys.boot_completed) || $(getprop sys.boot_completed) != 1 ]]; do sleep 1; done'
            adb shell input keyevent 82
            ./gradlew connectedDebugAndroidTest

  create-pr:
    needs: [run-unit-tests, run-android-instrumentation-tests]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create Pull Request
        uses: repo-sync/pull-request@v2
        with:
          source_branch: ${{ github.ref_name }}
          destination_branch: develop
          pr_title: 'Auto PR: ${{ github.ref_name }}'
          pr_body: 'This PR was auto-created from ${{ github.ref_name }}'
          github_token: ${{ secrets.GH_PAT }}
